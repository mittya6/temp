AWSTemplateFormatVersion: "2010-09-09"

Resources:

  SessionManageRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: "SessionManageRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: "ec2.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns: 
        - "arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SessionManageRole

  EC2Instance01: 
    Type: AWS::EC2::Instance
    Properties: 
      ImageId: ami-0b7546e839d7ace12
      InstanceType: t2.small
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces: 
        - AssociatePublicIpAddress: "true"
          DeviceIndex: "0"
          SubnetId: subnet-a37df588
          GroupSet:
            - sg-0f7e2fabac6b866d8
      UserData: !Base64 |
        #!/bin/bash
        sudo yum update -y
        yum -y install docker
        # āŖā|āWāgāŖé╠ÆŪē┴ (k8sŚp)
        sh -c "cat <<EOF > /etc/yum.repos.d/kubernetes.repo
        [kubernetes]
        name=Kubernetes
        baseurl=https://packages.cloud.google.com/yum/repos/kubernetes-el7-x86_64
        enabled=1
        gpgcheck=1
        repo_gpgcheck=0
        gpgkey=https://packages.cloud.google.com/yum/doc/yum-key.gpg https://packages.cloud.google.com/yum/doc/rpm-package-key.gpg
        EOF
        "
        yum install -y kubeadm kubectl --disableexcludes=kubernetes
        yum install -y tc
      Tags:
          - Key: Name
            Value: kubeadm-master

  EC2Instance02: 
    Type: AWS::EC2::Instance
    Properties: 
      ImageId: ami-0b7546e839d7ace12
      InstanceType: t2.small
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces: 
        - AssociatePublicIpAddress: "true"
          DeviceIndex: "0"
          SubnetId: subnet-a37df588
          GroupSet:
            - sg-0f7e2fabac6b866d8
      UserData: !Base64 |
        #!/bin/bash
        sudo yum update -y
        yum -y install docker
        # āŖā|āWāgāŖé╠ÆŪē┴ (k8sŚp)
        sh -c "cat <<EOF > /etc/yum.repos.d/kubernetes.repo
        [kubernetes]
        name=Kubernetes
        baseurl=https://packages.cloud.google.com/yum/repos/kubernetes-el7-x86_64
        enabled=1
        gpgcheck=1
        repo_gpgcheck=0
        gpgkey=https://packages.cloud.google.com/yum/doc/yum-key.gpg https://packages.cloud.google.com/yum/doc/rpm-package-key.gpg
        EOF
        "
        systemctl enable kubelet && systemctl start kubelet
        yum install -y tc
      Tags:
          - Key: Name
            Value: kubeadm-worker